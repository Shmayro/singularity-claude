name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts
          severity: warning

  validate-json:
    name: Validate JSON Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin.json
        run: python3 -m json.tool .claude-plugin/plugin.json > /dev/null
      - name: Validate marketplace.json
        run: python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
      - name: Validate hooks.json
        run: python3 -m json.tool hooks/hooks.json > /dev/null
      - name: Validate scoring template
        run: python3 -m json.tool skills/creating-skills/references/scoring-template.json > /dev/null

  validate-skills:
    name: Validate Skill Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SKILL.md frontmatter
        run: |
          errors=0
          for skill in skills/*/SKILL.md; do
            if ! head -1 "$skill" | grep -q "^---$"; then
              echo "ERROR: $skill missing YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi
            if ! grep -q "^name:" "$skill"; then
              echo "ERROR: $skill missing 'name' field"
              errors=$((errors + 1))
            fi
            if ! grep -q "^description:" "$skill"; then
              echo "ERROR: $skill missing 'description' field"
              errors=$((errors + 1))
            fi
            echo "OK: $skill"
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors validation errors"
            exit 1
          fi
      - name: Check agent metadata
        run: |
          errors=0
          for agent in agents/*.md; do
            if ! head -1 "$agent" | grep -q "^---$"; then
              echo "ERROR: $agent missing YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi
            if ! grep -q "^name:" "$agent"; then
              echo "ERROR: $agent missing 'name' field"
              errors=$((errors + 1))
            fi
            echo "OK: $agent"
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors validation errors"
            exit 1
          fi

  test-scripts:
    name: Test Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Test score-manager init
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.claude/singularity/scores"
          bash scripts/score-manager.sh init test-skill
          [ -f "$HOME/.claude/singularity/scores/test-skill.json" ] || exit 1
          echo "PASS: score init"
      - name: Test score-manager add and list
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.claude/singularity/scores"
          bash scripts/score-manager.sh init test-skill
          bash scripts/score-manager.sh add test-skill 85 --context "CI test"
          output=$(bash scripts/score-manager.sh list test-skill)
          echo "$output" | grep -q "85" || exit 1
          echo "PASS: score add and list"
      - name: Test telemetry-writer log and list
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.claude/singularity/telemetry"
          bash scripts/telemetry-writer.sh log test-skill --trigger "ci-test" --summary "Testing"
          output=$(bash scripts/telemetry-writer.sh list test-skill --last 1)
          echo "$output" | grep -q "ci-test" || exit 1
          echo "PASS: telemetry log and list"
      - name: Test session-start hook
        run: |
          export HOME=$(mktemp -d)
          export CLAUDE_PLUGIN_ROOT="$(pwd)"
          mkdir -p "$HOME/.claude/singularity"
          output=$(bash hooks/session-start)
          echo "$output" | python3 -m json.tool > /dev/null || exit 1
          echo "PASS: session-start hook outputs valid JSON"
